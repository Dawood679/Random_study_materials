version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: prisma_practice_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: prisma_user
      POSTGRES_PASSWORD: prisma_pass
      POSTGRES_DB: prisma_practice
    ports:
      - "5432:5432"
    volumes:
      - prisma_pg_data:/var/lib/postgresql/data

volumes:
  prisma_pg_data:
