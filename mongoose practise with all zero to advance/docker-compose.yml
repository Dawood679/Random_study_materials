version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: mongoose_practice_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: mongoose_practice
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s

volumes:
  mongo_data:
